spring.application.name=DisasterRelief
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=@gmail.com
spring.mail.password=mockup
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# JWT configuration
# Override jwt.secret in production with a strong random key (min 32 chars).
# Use the environment variable JWT_SECRET to avoid committing secrets to source control.
jwt.secret=disaster-relief-default-secret-key-change-in-production-min32
jwt.expiration-ms=86400000

# Recipient email for disaster relief request notifications.
# Override with the address of your local authorities / coordination team.
# Can also be set via the APP_RECIPIENT_EMAIL environment variable.
app.recipient-email=authorities@example.com

# Admin bootstrap – set all three properties to automatically create an ADMIN
# account on first start-up. Leave commented out (or unset) to skip bootstrapping.
# Use environment variables (APP_ADMIN_USERNAME, APP_ADMIN_EMAIL, APP_ADMIN_PASSWORD)
# to supply these values without committing credentials to source control.
# app.admin.username=admin
# app.admin.email=admin@example.com
# app.admin.password=ChangeMe123!

# ---------------------------------------------------------------------------
# Database – H2 in-memory (default, no external server required)
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:disasterreliefdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

